spring.application.name=APIGateway

server.port = 8081

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-route
spring.cloud.gateway.routes[0].uri=lb://USER
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# PRODUCT SERVICE
spring.cloud.gateway.routes[1].id=product-route
spring.cloud.gateway.routes[1].uri=lb://PRODUCT
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

# ORDER SERVICE
spring.cloud.gateway.routes[2].id=order-route
spring.cloud.gateway.routes[2].uri=lb://ORDER
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**